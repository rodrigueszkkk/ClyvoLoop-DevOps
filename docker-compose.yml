# =================================================================
# Docker Compose - Clyvo Loop
# Servicos: API .NET 8 + Oracle XE (banco conteinerizado)
# FIAP Challenge 2026 - DevOps Tools & Cloud Computing
# =================================================================

version: "3.9"

services:
  oracle-db:
    image: gvenzl/oracle-xe:21-slim
    container_name: clyvoloop-oracle
    restart: unless-stopped
    environment:
      ORACLE_PASSWORD: "StrongPass123!" 
      APP_USER: "RM562325"                
      APP_USER_PASSWORD: "100706"          
    ports:
      - "1521:1521"
    volumes:
      - oracle-data:/opt/oracle/oradata
    healthcheck:
      test: ["CMD", "healthcheck.sh"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s 

  api-clyvoloop:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: clyvoloop-api
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__OracleConnection=User Id=RM562325;Password=100706;Data Source=oracle-db:1521/XEPDB1;
    depends_on:
      oracle-db:
        condition: service_healthy 

volumes:
  oracle-data:
    driver: local